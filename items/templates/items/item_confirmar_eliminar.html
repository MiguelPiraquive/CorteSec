{% extends "base.html" %}
{% block title %}Eliminar Ítem{% endblock %}
{% block content %}
<div class="bg-white rounded-2xl shadow p-8 max-w-lg mx-auto">
    <h2 class="text-xl font-bold text-red-600 mb-4">¿Eliminar Ítem?</h2>
    <p class="mb-6">¿Estás seguro de que deseas eliminar el ítem <strong>{{ object.name }}</strong>?</p>
    <form method="post" class="flex gap-2">
        {% csrf_token %}
        <button type="submit" class="px-4 py-2 bg-red-600 text-white rounded hover:bg-red-700 transition">Eliminar</button>
        <a href="{% url 'items:item_lista' %}" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition">Cancelar</a>
    </form>
</div>
{% endblock %}
