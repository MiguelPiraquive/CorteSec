{% if messages %}
  <div class="max-w-3xl mx-auto w-full mt-2" aria-live="polite">
    {% for message in messages %}
      <div
        x-data="{ show: true }"
        x-show="show"
        x-transition:enter="transition ease-out duration-200"
        x-transition:enter-start="opacity-0 -translate-y-2"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-150"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="flex items-center gap-3 mb-2 px-4 py-3 rounded shadow
          {% if message.tags == 'success' %}bg-green-50 text-green-800 border-l-4 border-green-500 dark:bg-green-900/30 dark:text-green-200
          {% elif message.tags == 'error' %}bg-red-50 text-red-800 border-l-4 border-red-500 dark:bg-red-900/30 dark:text-red-200
          {% elif message.tags == 'warning' %}bg-yellow-50 text-yellow-800 border-l-4 border-yellow-500 dark:bg-yellow-900/30 dark:text-yellow-200
          {% else %}bg-blue-50 text-blue-800 border-l-4 border-blue-500 dark:bg-blue-900/30 dark:text-blue-200{% endif %}"
        role="alert"
        tabindex="0"
      >
        <i class="ti
          {% if message.tags == 'success' %}ti-circle-check
          {% elif message.tags == 'error' %}ti-circle-x
          {% elif message.tags == 'warning' %}ti-alert-triangle
          {% else %}ti-info-circle{% endif %}
          text-2xl flex-shrink-0"></i>
        <span class="flex-1">{{ message }}</span>
        <button @click="show = false" class="ml-2 text-gray-400 hover:text-gray-700 dark:hover:text-white transition" aria-label="Cerrar mensaje">
          <i class="ti ti-x"></i>
        </button>
      </div>
    {% endfor %}
  </div>
{% endif %}
