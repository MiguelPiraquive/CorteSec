{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Detalle Departamento" %}{% endblock %}
{% block content %}
<div class="bg-white rounded-2xl shadow p-8 max-w-xl mx-auto mt-10">
    <h2 class="text-2xl font-bold text-blue-700 text-center mb-8 tracking-tight">
        {{ object.nombre }}
    </h2>
    <ul class="divide-y divide-blue-100 mb-6">
       <li class="py-3 flex items-center gap-2">
            <span class="text-blue-700">{% trans "Código" %}:</span>
            <span>{{ object.codigo }}</span>
        </li>

    </ul>
    <div class="flex justify-center gap-4 mt-8">
        <a href="{% url 'locations:departamento_editar' object.pk %}" class="px-8 py-2 bg-yellow-400 text-white rounded-xl shadow hover:bg-yellow-500 transition font-bold text-lg">
            {% trans "Editar" %}
        </a>
        <a href="{% url 'locations:departamento_eliminar' object.pk %}" class="px-8 py-2 bg-red-500 text-white rounded-xl shadow hover:bg-red-600 transition font-bold text-lg">
            {% trans "Eliminar" %}
        </a>
        <a href="{% url 'locations:departamento_lista' %}" class="px-8 py-2 bg-gray-200 text-gray-700 rounded-xl hover:bg-gray-300 transition font-bold text-lg shadow">
            {% trans "Volver" %}
        </a>
    </div>
</div>
{% endblock %}
