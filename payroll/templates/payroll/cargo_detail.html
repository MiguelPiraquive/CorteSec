{% extends "base.html" %}
{% load i18n %}
{% block title %}{% trans "Detalle de Cargo" %}{% endblock %}
{% block content %}
<div class="bg-white rounded-2xl shadow p-8 max-w-lg mx-auto">
    <h2 class="text-2xl font-bold text-blue-700 mb-6">{% trans "Detalle de Cargo" %}</h2>
    <div class="mb-6">
        <p class="text-lg"><span class="font-semibold">{% trans "Nombre:" %}</span> {{ cargo.nombre }}</p>
    </div>
    <div class="flex gap-4">
        <a href="{% url 'cargo_update' cargo.pk %}" class="px-6 py-2 bg-yellow-400 text-white rounded-lg hover:bg-yellow-500 transition">
            {% trans "Editar" %}
        </a>
        <a href="{% url 'cargo_list' %}" class="px-6 py-2 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition">
            {% trans "Volver a la lista" %}
        </a>
    </div>
</div>
{% endblock %}
