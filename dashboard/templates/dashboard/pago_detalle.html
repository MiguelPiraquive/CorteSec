{% extends "base.html" %}
{% block title %}Detalle Pago{% endblock %}
{% block content %}
<div class="bg-white rounded-2xl shadow p-8 max-w-xl mx-auto">
    <h2 class="text-2xl font-bold text-blue-700 mb-4">Pago de {{ object.proyecto.nombre }}</h2>
    <ul class="divide-y divide-blue-100 mb-6">
        <li class="py-2"><strong>Monto:</strong> ${{ object.monto }}</li>
        <li class="py-2"><strong>Fecha:</strong> {{ object.fecha }}</li>
        <li class="py-2"><strong>Descripción:</strong> {{ object.descripcion }}</li>
    </ul>
    <div class="flex gap-2">
        <a href="{% url 'dashboard:pago_editar' object.pk %}" class="px-4 py-2 bg-yellow-400 text-white rounded hover:bg-yellow-500 transition">
            Editar
        </a>
        <a href="{% url 'dashboard:pago_eliminar' object.pk %}" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition">
            Eliminar
        </a>
        <a href="{% url 'dashboard:pago_lista' %}" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition">
            Volver
        </a>
    </div>
</div>
{% endblock %}
