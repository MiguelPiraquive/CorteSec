{% extends "base.html" %}
{% block title %}Detalle Empresa{% endblock %}
{% block content %}
<div class="bg-white rounded-2xl shadow p-8 max-w-xl mx-auto">
    <h2 class="text-2xl font-bold text-blue-700 mb-4">{{ object.nombre }}</h2>
    <ul class="divide-y divide-blue-100 mb-6">
        <li class="py-2"><strong>NIT:</strong> {{ object.nit }}</li>
        <li class="py-2"><strong>Teléfono:</strong> {{ object.telefono }}</li>
        <li class="py-2"><strong>Correo:</strong> {{ object.email }}</li>
        <li class="py-2"><strong>Dirección:</strong> {{ object.direccion }}</li>
    </ul>
    <div class="flex gap-2">
        <a href="{% url 'dashboard:contratista_editar' object.pk %}" class="px-4 py-2 bg-yellow-400 text-white rounded hover:bg-yellow-500 transition">
            Editar
        </a>
        <a href="{% url 'dashboard:contratista_eliminar' object.pk %}" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition">
            Eliminar
        </a>
        <a href="{% url 'dashboard:contratista_lista' %}" class="px-4 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 transition">
            Volver
        </a>
    </div>
</div>
{% endblock %}
