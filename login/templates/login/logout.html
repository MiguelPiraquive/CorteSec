{% block title %}Sesión cerrada{% endblock %}
{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-100 to-blue-300">
    <div class="bg-white shadow-xl rounded-2xl p-10 w-full max-w-md text-center">
        <h2 class="text-2xl font-bold text-blue-700 mb-4">Sesión cerrada</h2>
        <p class="text-gray-600 mb-6">Has cerrado sesión correctamente.</p>
        <a href="{% url 'login:login' %}" class="inline-block px-6 py-2 bg-blue-600 text-white rounded-lg font-bold hover:bg-blue-700 transition">Iniciar Sesión</a>
    </div>
</div>
{% endblock %}
