<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
</head>
<body>
    <div id="debug-info">
        <h2>Dashboard Debug Information</h2>
        <div id="console-output"></div>
    </div>

    <script>
        // Función para logear en la página
        function logToPage(message, type = 'info') {
            const output = document.getElementById('console-output');
            const div = document.createElement('div');
            div.style.padding = '5px';
            div.style.margin = '2px';
            div.style.border = '1px solid #ccc';
            div.style.backgroundColor = type === 'error' ? '#ffebee' : type === 'warning' ? '#fff3e0' : '#e8f5e8';
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            output.appendChild(div);
            console.log(message);
        }

        // Función para probar la API
        async function testAPI() {
            try {
                logToPage('🔍 Probando API de gráficos...');
                const response = await fetch('/dashboard/api/graficos/');
                logToPage(`Status: ${response.status}`);
                
                if (response.ok) {
                    const data = await response.json();
                    logToPage(`✅ API responde correctamente: ${JSON.stringify(data, null, 2)}`);
                    return data;
                } else {
                    const text = await response.text();
                    logToPage(`❌ Error en API: ${text}`, 'error');
                    return null;
                }
            } catch (error) {
                logToPage(`❌ Error de red: ${error.message}`, 'error');
                return null;
            }
        }

        // Función para verificar Chart.js
        function testChartJS() {
            logToPage('🔍 Verificando Chart.js...');
            if (typeof Chart !== 'undefined') {
                logToPage(`✅ Chart.js disponible: v${Chart.version}`);
                return true;
            } else {
                logToPage('❌ Chart.js no disponible', 'error');
                return false;
            }
        }

        // Función para verificar Alpine.js
        function testAlpineJS() {
            logToPage('🔍 Verificando Alpine.js...');
            if (typeof Alpine !== 'undefined') {
                logToPage(`✅ Alpine.js disponible`);
                return true;
            } else {
                logToPage('❌ Alpine.js no disponible', 'error');
                return false;
            }
        }

        // Ejecutar pruebas cuando el DOM esté listo
        document.addEventListener('DOMContentLoaded', async function() {
            logToPage('🚀 Iniciando diagnóstico de dashboard...');
            
            // Verificar dependencias
            testChartJS();
            testAlpineJS();
            
            // Probar API
            await testAPI();
            
            logToPage('✅ Diagnóstico completado');
        });
    </script>
</body>
</html>
